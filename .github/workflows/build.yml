name: Build executables

# Builds the one-file ActionVouch desktop app on each OS and uploads the
# binaries as artifacts. Code signing runs only when the relevant secrets are
# configured (see packaging/README.md); without them the binaries are unsigned.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Least privilege: the build only reads the repo and uploads artifacts.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (package extra)
        run: python -m pip install -e ".[package]"

      - name: Build one-file executable
        run: pyinstaller packaging/actionvouch.spec --noconfirm

      # Signing secrets are scoped to these steps only (not job-wide), so the
      # build/test steps above never see them. Each step self-skips when its
      # cert is not configured, keeping the secret out of the `if:` context.
      - name: Sign (Windows / Authenticode)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERT_PFX_BASE64) {
            Write-Host "No Windows signing cert configured; shipping the build unsigned."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          & signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 dist/ActionVouch.exe

      - name: Sign + notarize (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing cert configured; shipping the build unsigned."
            exit 0
          fi
          # Honest placeholder: the codesign + notarytool flow is NOT yet wired
          # up in CI, so this binary is still unsigned even when secrets are set.
          echo "::warning::Apple signing secrets are set, but CI signing is not"
          echo "::warning::implemented yet — this macOS binary is NOT signed."
          # Documented release flow to implement here (see packaging/README.md):
          #   1. import the Developer ID cert into a temporary keychain;
          #   2. codesign --deep --options runtime --sign "Developer ID Application: ..." dist/ActionVouch
          #   3. xcrun notarytool submit dist/ActionVouch --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          #   4. xcrun stapler staple dist/ActionVouch

      - name: Smoke-test the built binary (headless)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BIN="dist/ActionVouch.exe"; else BIN="dist/ActionVouch"; chmod +x "$BIN"; fi
          "$BIN" app --no-browser --port 8799 &
          PID=$!
          for i in $(seq 1 15); do curl -fsS "http://127.0.0.1:8799/" >/dev/null 2>&1 && break; sleep 1; done
          curl -fsS "http://127.0.0.1:8799/" | grep -q "ActionVouch"
          curl -fsS -X POST "http://127.0.0.1:8799/api/schema" -H "Content-Type: application/json" -d '{}' | grep -q app_version
          echo "binary serves the app and schema OK"
          kill "$PID" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ActionVouch-${{ matrix.os }}
          path: |
            dist/ActionVouch
            dist/ActionVouch.exe
          if-no-files-found: error
