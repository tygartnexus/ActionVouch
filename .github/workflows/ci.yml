name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: the gate only needs to read the repo.
permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (dev extra)
        run: python -m pip install -e ".[dev]"
      - name: Install Chromium (for the browser/wizard tests)
        run: python -m playwright install --with-deps chromium
      - name: Lint
        run: python -m ruff check actionvouch tests
      - name: Format check
        run: python -m black --check actionvouch tests
      - name: Type check
        run: python -m mypy actionvouch
      - name: Tests
        run: python -m pytest -q
      - name: Verification harness (core + browser)
        run: python verify_actionvouch.py --include-browser
